# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: fobia
# "service" is the name of this project. This will also be added to your AWS resource names.
service: aws-crud-serverless
frameworkVersion: "4.33.0"

# PROVIDER CONFIGURATION
# Defines the cloud provider (AWS), runtime environment, and global settings.
provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  # Optimization: Log retention limits costs and avoids clutter in CloudWatch
  logRetentionInDays: 7

  # Environment variables accessible within Lambda functions
  environment:
    ITEMS_TABLE: ${self:custom.tableName}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}

  # IAM ROLE STATEMENTS
  # Implements the Principle of Least Privilege (PoLP).
  # Only grants necessary permissions for DynamoDB operations on the specific table.
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt ItemsTable.Arn
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource:
            - "arn:aws:logs:${aws:region}:${aws:accountId}:log-group:/aws/lambda/*"

  # HTTP API AUTHORIZER
  # Configures Amazon Cognito as a JWT Authorizer for the HTTP API endpoints.
  httpApi:
    authorizers:
      cognitoAuth:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: https://cognito-idp.us-east-1.amazonaws.com/${env:COGNITO_USER_POOL_ID}
        audience:
          - ${env:COGNITO_CLIENT_ID}

# CUSTOM VARIABLES
# Shared configuration variables for the service.
custom:
  # Dynamic table name based on the deployment stage (e.g., items-table-dev or items-table-prod).
  tableName: "items-table-${sls:stage}"

# INFRASTRUCTURE RESOURCES (CloudFormation)
# Defines the underlying AWS resources like DynamoDB.
resources:
  Resources:
    ItemsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: category # Partition Key for GSI
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH # Partition Key (Unique ID)
        # BillingMode: PAY_PER_REQUEST is ideal for serverless to optimize costs (On-demand)
        BillingMode: PAY_PER_REQUEST

        # GLOBAL SECONDARY INDEX (GSI)
        # Enables efficient filtering by 'category' without performing a full table scan.
        GlobalSecondaryIndexes:
          - IndexName: CategoryIndex
            KeySchema:
              - AttributeName: category
                KeyType: HASH
            Projection:
              # ProjectionType: ALL ensures all item attributes are available in the index query
              ProjectionType: ALL

# LAMBDA FUNCTIONS
# Defines the mapping between HTTP endpoints and handler code.

# SECURITY: Enforces JWT validation via Amazon Cognito.
# The request must include a valid 'Authorization' header with a Bearer token.
functions:
  createItem:
    handler: src/handlers/createItem.handler
    events:
      - httpApi:
          path: /items
          method: POST
          authorizer:
            name: cognitoAuth

  updateItem:
    handler: src/handlers/updateItem.handler
    events:
      - httpApi:
          path: /items/{id}
          method: PUT
          authorizer:
            name: cognitoAuth

  deleteItem:
    handler: src/handlers/deleteItem.handler
    events:
      - httpApi:
          path: /items/{id}
          method: DELETE
          authorizer:
            name: cognitoAuth

  getItem:
    handler: src/handlers/getItem.handler
    events:
      - httpApi:
          path: /items/{id}
          method: GET
          authorizer:
            name: cognitoAuth

  getAllItems:
    handler: src/handlers/getAllItems.handler
    events:
      - httpApi:
          path: /items
          method: GET
          authorizer:
            name: cognitoAuth
