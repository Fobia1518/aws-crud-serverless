# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: fobia
# "service" is the name of this project. This will also be added to your AWS resource names.
service: aws-crud-serverless
frameworkVersion: '4.33.0'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}

  environment:
    ITEMS_TABLE: ${self:custom.tableName}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt ItemsTable.Arn
  # Uncomment to easily set up a custom domain. Read the docs for more details:
  # https://www.serverless.com/framework/docs/providers/aws/guide/domains
  # domain: api.example.com

##Database dynamoDB
custom:
  tableName: 'items-table-${sls:stage}'

resources:
  Resources:
    ItemsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

##API CRUD        
functions:
  createItem:
    handler: src/handlers/createItem.handler
    events:
      - httpApi:
          path: /items
          method: post

  putItem:
    handler: src/handlers/putItem.handler
    events:
      - httpApi:
          path: /items
          method: put

  deleteItem:
    handler: src/handlers/deleteItem.handler
    events:
      - httpApi:
          path: /items
          method: delete

  getItem:
    handler: src/handlers/getItem.handler
    events:
      - httpApi:
          path: /items/{id}
          method: get

  getAllItems:
    handler: src/handlers/getAllItems.handler
    events:
      - httpApi:
          path: /items
          method: get


